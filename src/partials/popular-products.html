<section class="section popular-products" id="popular-products">
  <div class="container popular-products-container">
    <h2 class="popular-products-title">Наші бестселлери</h2>

    <div class="popular-products-slider swiper">
      <div class="swiper-wrapper popular-products-wrapper"></div>

      <div class="popular-products-controls">
        <div class="swiper-pagination popular-products-pagination"></div>

        <div class="popular-products-nav">
          <button
            class="swiper-button-prev popular-products-prev"
            type="button"
            aria-label="Попередній слайд"
          >
            <svg width="24" height="24">
              <use href="/img/icons.svg#icon-arrow-left"></use>
            </svg>
          </button>

          <button
            class="swiper-button-next popular-products-next"
            type="button"
            aria-label="Наступний слайд"
          >
            <svg width="24" height="24">
              <use href="/img/icons.svg#icon-arrow-right1"></use>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
